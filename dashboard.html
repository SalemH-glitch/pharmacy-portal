<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — RxTools</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body data-page="dashboard">

  <nav class="portal-nav">
    <div class="nav-inner">
      <a class="nav-brand" href="dashboard.html">
        <div class="nav-brand-icon">Rx</div>
        RxTools
      </a>
      <div class="nav-links">
        <a href="patients.html" class="nav-link">Patients</a>
        <span class="nav-sep">|</span>
        <span class="nav-user" id="nav-user"></span>
        <button class="nav-signout" id="nav-signout">Sign Out</button>
      </div>
    </div>
  </nav>

  <main class="portal-main">
    <div class="portal-container">

      <div class="page-header">
        <h1 class="page-title">Dashboard</h1>
      </div>

      <section>
        <div class="section-header">
          <span class="section-title">Tools</span>
        </div>
        <div class="tools-grid" id="tools-grid"></div>
      </section>

      <section>
        <div class="section-header">
          <span class="section-title">Recent Calculations</span>
          <a href="patients.html" class="section-link">All patients →</a>
        </div>
        <div class="table-card" id="recent-calcs">
          <div class="loading-state">Loading recent activity...</div>
        </div>
      </section>

    </div>
  </main>

  <footer class="portal-footer">RxTools — For licensed pharmacy professionals only</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal.js"></script>
</body>
</html>
